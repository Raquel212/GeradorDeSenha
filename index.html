<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Senhas </title>
    <link href="[https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Fira+Code:wght@500&display=swap](https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Fira+Code:wght@500&display=swap)" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- APP PRINCIPAL -->
    <div class="container" id="app-container">
        <div class="header">
            <svg xmlns="[http://www.w3.org/2000/svg](http://www.w3.org/2000/svg)" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />
            </svg>
            <h2>Gerador de Senhas</h2>
        </div>

        <div class="password-wrapper">
            <textarea id="password" readonly placeholder="Suas senhas aparecerão aqui..."></textarea>
            <button class="copy-btn" onclick="copiarSenhaManualmente()" title="Copiar todas as senhas">
                <svg xmlns="[http://www.w3.org/2000/svg](http://www.w3.org/2000/svg)" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                </svg>
            </button>
        </div>

        <div class="settings">
            <div class="setting-group">
                <label>Tamanho</label>
                <input type="number" id="length" min="4" max="64" value="12">
            </div>
            <div class="setting-group">
                <label>Quantidade</label>
                <input type="number" id="quantity" min="1" max="20" value="1">
            </div>

            <div class="setting-group full-width">
                <label>Excluir Caracteres (Ex: lO01)</label>
                <input type="text" id="exclude" placeholder="Digite os caracteres para remover">
            </div>

            <label class="checkbox-group">
                <input type="checkbox" id="chk-upper" checked> Maiúsculas (A-Z)
            </label>
            <label class="checkbox-group">
                <input type="checkbox" id="chk-lower" checked> Minúsculas (a-z)
            </label>
            <label class="checkbox-group">
                <input type="checkbox" id="chk-numbers" checked> Números (0-9)
            </label>
            <label class="checkbox-group">
                <input type="checkbox" id="chk-symbols" checked> Símbolos (!@#$)
            </label>
        </div>

        <button class="btn generate-btn" onclick="gerarSenhas()">
            <svg xmlns="[http://www.w3.org/2000/svg](http://www.w3.org/2000/svg)" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
            </svg>
            Gerar Senha(s)
        </button>

        <div class="history-section">
            <div class="history-header">
                <h3>Histórico</h3>
                <button class="clear-btn" onclick="limparHistorico()">Limpar</button>
            </div>
            <ul class="history-list" id="history-list">
                <!-- Itens do histórico aparecerão aqui -->
            </ul>
        </div>
    </div>

    <div id="toast" class="toast">Mensagem aqui</div>

    <script src="script.js"></script>
</body>
</html>
